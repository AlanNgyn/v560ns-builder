name: Reusable - iOS AdHoc Build

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      environment:
        required: true
        type: string
      xcode_version:
        required: true
        type: string

jobs:
  ios-adhoc:
    name: iOS AdHoc Build
    environment: ${{ inputs.environment }}
    runs-on: ${{ inputs.xcode_version == '26.3' && 'macos-26' || 'macos-15' }}
    timeout-minutes: 60
    steps:
      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode_version }}

      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Create fastlane keychain
        run: |
          security create-keychain -p "" ${{ vars.KEYCHAIN_NAME }}
          security default-keychain -s ${{ vars.KEYCHAIN_NAME }}

      - name: Setup SSH for private repo
        uses: ./.github/actions/setup-ssh
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          private_host: ${{ secrets.PRIVATE_HOST }}

      - name: Checkout real code
        uses: ./.github/actions/checkout-private-repo
        with:
          branch: ${{ inputs.branch }}
          private_repo_full_name: ${{ secrets.PRIVATE_REPO_FULL_NAME }}

      - name: Install JS dependencies
        shell: bash
        run: yarn --cwd real-code install --silent

      - name: Setup environment file
        uses: ./.github/actions/setup-env
        with:
          environment: ${{ inputs.environment }}
          passbolt_env_file: ${{ secrets.PASSBOLT_ENV_FILE }}
          passbolt_private_key: ${{ secrets.PASSBOLT_PRIVATE_KEY }}

      - name: Prepare mobile build
        uses: ./.github/actions/prepare-mobile-build

      - name: iOS Pod install
        working-directory: real-code/ios
        run: pod install --repo-update --silent

      - name: Build & AdHoc via Fastlane
        working-directory: real-code/fastlane
        env:
          KEYCHAIN_NAME: ${{ vars.KEYCHAIN_NAME }}
          KEYCHAIN_PWD: ""
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          DIAWI_API_TOKEN: ${{ secrets.DIAWI_API_TOKEN }}
          GG_DRIVE_FOLDER_ID: ${{ vars.GG_DRIVE_FOLDER_ID }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          BUILD_BRANCH: ${{ inputs.branch }}
          DRIVER_KEY_JSON: ${{ secrets.DRIVER_KEY_JSON }}
          FASTLANE_DISABLE_UPDATE_CHECK: true
        run: bundle exec fastlane ios adhoc env:${{ inputs.environment }}

      - name: Build for Simulator
        if: inputs.branch == 'V560NS-221-v1'
        working-directory: real-code
        run: |
          xcodebuild -workspace ios/TemoorstApp.xcworkspace \
            -scheme "TemoorstApp Development Release" \
            -sdk iphonesimulator \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/sim-build \
            build | tail -20
          echo "=== Searching for .app ==="
          find ios/sim-build -name "*.app" -type d

      - name: Install Maestro
        if: inputs.branch == 'V560NS-221-v1'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Prepare Maestro report directory
        if: inputs.branch == 'V560NS-221-v1'
        run: mkdir -p ${{ github.workspace }}/maestro-report/videos ${{ github.workspace }}/maestro-report/screenshots

      - name: List available simulators
        if: inputs.branch == 'V560NS-221-v1'
        run: xcrun simctl list devices available

      - name: Run Maestro E2E Tests (iOS)
        if: inputs.branch == 'V560NS-221-v1'
        working-directory: real-code
        run: |
          # Boot first available iPhone simulator
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS' in runtime or 'iphone' in runtime.lower():
              for d in devices:
                if 'iPhone' in d['name']:
                  print(d['udid'])
                  sys.exit(0)
          " 2>/dev/null)
          echo "Booting device: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true

          # Find and install .app
          APP_PATH=$(find ios/sim-build -name "*.app" -type d | grep -v "\.app/" | head -1)
          echo "Found app: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            exit 1
          fi
          xcrun simctl install booted "$APP_PATH"

          # Record video for each flow
          for flow in .maestro/*.yaml; do
            [ "$(basename "$flow")" = "config.yaml" ] && continue
            FLOW_NAME=$(basename "$flow" .yaml)
            echo "=== Running: $FLOW_NAME ==="
            maestro record --local "$flow" "${{ github.workspace }}/maestro-report/videos/${FLOW_NAME}.mp4" || true
          done

          # Move screenshots to report dir
          find .maestro -name "*.png" -exec mv {} "${{ github.workspace }}/maestro-report/screenshots/" \; 2>/dev/null || true

      - name: Upload E2E evidence (iOS)
        if: inputs.branch == 'V560NS-221-v1' && always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-evidence-${{ github.run_number }}
          path: maestro-report/
          retention-days: 30

      - name: Upload Gym log as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-log
          path: "/Users/runner/Library/Logs/gym/App-TemoorstApp Development Release.log"

      - name: Notify on failure
        uses: ./.github/actions/notify-on-failure
        if: failure()
        with:
          project_name: ${{ vars.PROJECT_NAME }}
          webhook_url: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          job_name: ${{ github.job }}
          branch: ${{ inputs.branch }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
