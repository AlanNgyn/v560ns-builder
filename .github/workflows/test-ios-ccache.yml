name: Test iOS compile cache (no notify)

# Standalone workflow to iterate on iOS compile caching WITHOUT touching the team group:
# no notify-start, no Mattermost, no Drive/Diawi upload (never calls a Fastlane lane), no signing.
#
# Tests Xcode 26 "compilation caching" (LLVM CAS) — the modern, content-addressed (branch-safe)
# replacement for ccache that actually works with the new build system / explicit modules.
# (ccache-via-CC was confirmed dead on Xcode 26.3: 0 invocations on a real 21-min compile.)
#
# CAS lives at ~/Library/Developer/Xcode/DerivedData/CompilationCache.noindex (fixed shared path,
# survives `clean`), so we persist THAT across runs. Run twice: run 1 populates (cold, slow),
# run 2 reuses (warm) — the "Compile natives" duration on run 2 is the real measure.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Build Branch"
        required: true
        default: "develop"
      environment:
        description: "Select environment (staging or live)"
        required: true
        default: "staging"
      xcode_version:
        description: "Xcode version (must be 26.x for compilation caching)"
        required: true
        default: "26.3"

jobs:
  ios-compcache-test:
    name: iOS compile-cache test (build only, no notify)
    environment: ${{ inputs.environment }}
    runs-on: ${{ inputs.xcode_version == '26.3' && 'macos-26' || 'macos-15' }}
    timeout-minutes: 60
    steps:
      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode_version }}

      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup SSH for private repo
        uses: ./.github/actions/setup-ssh
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          private_host: ${{ secrets.PRIVATE_HOST }}

      - name: Checkout real code
        uses: ./.github/actions/checkout-private-repo
        with:
          branch: ${{ inputs.branch }}
          private_repo_full_name: ${{ secrets.PRIVATE_REPO_FULL_NAME }}

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            real-code/node_modules
            ~/.cache/yarn
          key: yarn-${{ hashFiles('real-code/yarn.lock') }}
          restore-keys: |
            yarn-

      - name: Install JS dependencies
        shell: bash
        run: yarn --cwd real-code install --silent

      - name: Setup environment file
        uses: ./.github/actions/setup-env
        with:
          environment: ${{ inputs.environment }}
          passbolt_env_file: ${{ secrets.PASSBOLT_ENV_FILE }}
          passbolt_private_key: ${{ secrets.PASSBOLT_PRIVATE_KEY }}

      - name: Restore Xcode compilation cache (CAS)
        uses: actions/cache@v4
        with:
          # LLVM CAS: content-addressed (a key = digest of the compilation's contents), so it is
          # safe to share across branches — a changed input simply misses. Fixed shared path,
          # not tied to the per-project DerivedData dir; survives `clean`. Rolling key keeps the
          # newest snapshot per Xcode version.
          # Separate key prefix from the real workflows: this test builds for the SIMULATOR, whose
          # CAS entries don't match the real DEVICE build. Sharing a prefix would let a test run's
          # simulator cache become the "latest" and get restored into a real device build (= cold).
          path: ~/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
          key: xcode-compcache-test-${{ inputs.xcode_version }}-${{ github.run_id }}
          restore-keys: |
            xcode-compcache-test-${{ inputs.xcode_version }}-

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-${{ hashFiles('real-code/ios/Podfile.lock') }}
          restore-keys: |
            cocoapods-

      - name: iOS Pod install
        working-directory: real-code/ios
        run: pod install

      - name: Compile natives (simulator, no sign, no JS bundle, compilation cache ON)
        working-directory: real-code
        env:
          SKIP_BUNDLING: "1"
        run: |
          set -o pipefail
          if [ "${{ inputs.environment }}" = "staging" ]; then
            SCHEME="TemoorstApp Development Release"
          else
            SCHEME="TemoorstApp Production Release"
          fi
          echo "Building scheme: $SCHEME (COMPILATION_CACHE_ENABLE_CACHING=YES)"
          # No -derivedDataPath override: keep the default so the CAS lands at the documented
          # ~/Library/Developer/Xcode/DerivedData/CompilationCache.noindex that we cache above.
          xcodebuild build \
            -workspace ios/TemoorstApp.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            COMPILATION_CACHE_ENABLE_CACHING=YES \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            | tail -60

      - name: Compilation cache stats
        if: always()
        run: |
          CAS="$HOME/Library/Developer/Xcode/DerivedData/CompilationCache.noindex"
          echo "===== CompilationCache.noindex ====="
          if [ -d "$CAS" ]; then
            du -sh "$CAS"
            echo "files: $(find "$CAS" -type f 2>/dev/null | wc -l | tr -d ' ')"
          else
            echo "NO CompilationCache.noindex at default path → compilation caching did NOT engage."
            echo "Searching DerivedData for any CompilationCache.noindex..."
            find "$HOME/Library/Developer/Xcode/DerivedData" -maxdepth 3 -name 'CompilationCache.noindex' -type d 2>/dev/null || true
          fi
